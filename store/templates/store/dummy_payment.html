{% extends 'store/base.html' %}

{% block title %}Payment — THREADORY{% endblock %}

{% block content %}
<section class="section">
    <div class="container" style="max-width: 600px;">
        <h1 class="page-title text-center">Secure Checkout</h1>
        
        <div class="payment-box" style="background: var(--bg-secondary, #f9f9f9); padding: 30px; border-radius: 8px; border: 1px solid var(--border-color, #eee);">
            <div class="order-summary text-center" style="margin-bottom: 30px;">
                <h3 style="color: #666; font-weight: normal; margin-bottom: 5px;">Payment Amount</h3>
                <h2 style="font-size: 2.5rem; margin-top: 0;">₹{{ order.total }}</h2>
                <p>Order #{{ order.id }}</p>
            </div>
            
            <div class="stripe-info text-center" style="margin-bottom: 30px;">
                <p style="color: #666; font-size: 1.1em; margin-bottom: 20px;">
                    You will be redirected to Stripe to securely complete your payment.
                </p>
                <div style="font-size: 2em; color: #5469d4; margin-bottom: 20px;">
                    <i class="fab fa-stripe"></i>
                </div>
            </div>

            <form method="POST" action="{% url 'store:create_checkout_session' order.id %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary btn-lg btn-block" style="font-size: 1.2rem; background-color: #5469d4; border-color: #5469d4;">
                    Pay ₹{{ order.total }} with Stripe <i class="fas fa-lock"></i>
                </button>
            </form>
        </div>
        
    </div>
</section>
{% endblock %}
